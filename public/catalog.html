<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - KICKS SELECT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-left">
            <div class="nav-brand">KICKS SELECT</div>
            <ul>
                <li><a href="index.html">GESTIÓN</a></li>
                <li><a href="catalog.html" class="active">CATÁLOGO</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <div class="nav-search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar productos...">
            </div>
        </div>
    </nav>

    <!-- HERO: Carousel de productos destacados -->
    <section class="hero-section">
        <div class="hero-header">
            <h1 class="catalog-title">LATEST DROPS</h1>
            <p class="catalog-subtitle">Exclusive access to the most coveted silhouettes and limited colorways in the
                culture.</p>
        </div>
        <div class="carousel-wrapper">
            <button class="carousel-arrow carousel-prev" id="carouselPrev">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <div class="carousel-track" id="carouselTrack">
                <!-- Se inyecta dinámicamente desde catalog.js -->
            </div>
            <button class="carousel-arrow carousel-next" id="carouselNext">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>
    </section>

    <!-- Filtros por categoría -->
    <section class="filters-section">
        <div class="filters-container">
            <span class="filters-label">Filtrar:</span>
            <div class="filter-pills" id="filterPills">
                <button class="filter-pill active" data-category="all">Todos</button>
                <!-- Se inyectan dinámicamente -->
            </div>
        </div>
    </section>

    <!-- Grid completo de productos -->
    <section class="products-section">
        <h2 class="section-title">TODOS LOS PRODUCTOS</h2>
        <div id="catalogContainer" class="catalog-grid">
            <!-- Aquí se van a renderizar todas las tarjetas -->
        </div>
    </section>

    <!-- Modal de Detalle -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modalDetails"></div>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-brand">KICKS SELECT</div>
            <div class="footer-links">
                <a href="#">PRIVACY</a>
                <a href="#">TERMS</a>
                <a href="#">STORES</a>
            </div>
            <div class="footer-copy">&copy; 2026 KICKS SELECT. ALL RIGHTS RESERVED.</div>
        </div>
    </footer>

    <script type="module" src="./js/catalog.js"></script>
</body>

</html>
