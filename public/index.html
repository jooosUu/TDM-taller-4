<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión - KICKS SELECT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-left">
            <div class="nav-brand">Tillos Store </div>
            <ul>
                <li><a href="index.html" class="active">GESTIÓN</a></li>
                <li><a href="catalog.html">CATÁLOGO</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <div class="nav-search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar productos...">
            </div>
        </div>
    </nav>

    <section class="page-header">
        <h1>GESTIÓN DE INVENTARIO</h1>
        <p class="page-subtitle">Administra el catálogo de productos de la tienda</p>
    </section>

    <div class="gestion-container" style="flex-direction: column; align-items: start;">
        <button id="openAddModalBtn" class="btn-primary" style="margin-bottom: 2rem;">+ AÑADIR PRODUCTO</button>

        <!-- Modal para el Formulario -->
        <div id="addModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="closeAddModalBtn">&times;</span>
                <h2 style="margin-top: 0; margin-bottom: 1.5rem; font-size: 1.5rem; font-weight: 800; color: #111;">
                    Agregar / Editar Producto</h2>
                <form id="itemForm" class="gestion-form">
                    <div class="form-grid">
                        <input type="text" id="name" placeholder="Nombre del zapato" required>
                        <input type="text" id="description" placeholder="Descripción del producto">
                        <input type="number" id="precio" placeholder="Precio (COP)" required min="0">
                        <input type="text" id="categoria" placeholder="Categoría" required>
                        <input type="number" id="stock" placeholder="Unidades" required min="0">
                        <input type="date" id="fecha" required>
                    </div>
                    <input type="url" id="imageUrl" placeholder="URL de imagen del producto"
                        style="margin-bottom: 1.5rem; width: 100%;">
                    <button type="submit" id="submitBtn" class="btn-primary" style="width: 100%;">GUARDAR
                        PRODUCTO</button>
                </form>
            </div>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Precio</th>
                        <th>Categoría</th>
                        <th>Stock</th>
                        <th>Fecha</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="itemsTable"></tbody>
            </table>
        </div>
    </div>

    <script type="module" src="./js/main.js"></script>
</body>

</html>
